name: Build & Distribute to Firebase

# ── Trigger ────────────────────────────────────────────────────────────────────
# Manually triggered from the GitHub Actions UI.
# Optionally supply release notes and a tester group.
on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes shown to testers in Firebase App Distribution"
        required: false
        default: "New build from GitHub Actions"
      tester_groups:
        description: "Comma-separated Firebase tester group aliases (leave blank for default)"
        required: false
        default: "internal-testers"

# ── Concurrency ────────────────────────────────────────────────────────────────
# Cancel any in-progress run for the same workflow so we never queue up stale builds.
concurrency:
  group: firebase-distribute
  cancel-in-progress: true

jobs:
  build-and-distribute:
    name: Build APK & Distribute
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java (required by Gradle) ─────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      # ── 4. Restore google-services.json ──────────────────────────────────────
      # The file is excluded from git (.gitignore). Store its full content as a
      # base64-encoded secret: GOOGLE_SERVICES_JSON_BASE64
      #   macOS/Linux: base64 -w 0 android/app/google-services.json
      #   Windows PS:  [Convert]::ToBase64String([IO.File]::ReadAllBytes("android\app\google-services.json"))
      - name: Restore google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" \
            | tr -d '[:space:]' \
            | base64 --decode \
            > android/app/google-services.json

      # ── 5. Generate keystore on the runner ───────────────────────────────────
      # No need to store a keystore file — we generate a fresh one each run
      # using keytool (bundled with Java). The APK is signed consistently as
      # long as the same alias/passwords are used.
      # Secrets needed:
      #   KEYSTORE_PASSWORD  — password for the keystore store
      #   KEY_ALIAS          — key alias (e.g. "spendfluxa")
      #   KEY_PASSWORD       — password for the key entry
      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android/app/keystore.jks \
            -storetype JKS \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -dname "CN=SpendFluxa, OU=Mobile, O=SpendFluxa, L=Unknown, ST=Unknown, C=IN"

      # ── 6. Create key.properties ──────────────────────────────────────────────
      # Gradle reads signing config from this file.
      # Secrets needed:
      #   KEYSTORE_PASSWORD   — storePassword
      #   KEY_ALIAS           — keyAlias (e.g. "spendfluxa")
      #   KEY_PASSWORD        — keyPassword
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      # ── 7. Flutter dependencies ───────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 8. Lint / analyse ─────────────────────────────────────────────────────
      - name: Analyse Dart code
        run: flutter analyze --no-fatal-infos

      # ── 9. Build release APK ──────────────────────────────────────────────────
      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --build-number=${{ github.run_number }} \
            --build-name=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)

      # ── 10. Upload APK as workflow artifact ───────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spendfluxa-release-${{ github.run_number }}.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 11. Install Firebase CLI ──────────────────────────────────────────────
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # ── 12. Distribute via Firebase App Distribution ──────────────────────────
      # Secrets needed:
      #   FIREBASE_APP_ID          — from Firebase console → Project settings → Your apps
      #                              Format: 1:XXXXXXXXXX:android:XXXXXXXXXXXXXXXX
      #   FIREBASE_SERVICE_ACCOUNT — JSON key of a GCP service account with the
      #                              "Firebase App Distribution Admin" role, base64-encoded
      - name: Distribute to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Write service account JSON to a temp file
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/service-account.json

          firebase appdistribution:distribute \
            build/app/outputs/flutter-apk/app-release.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --release-notes "${{ github.event.inputs.release_notes }}" \
            --groups "${{ github.event.inputs.tester_groups }}"

      # ── 13. Clean up secrets from disk ───────────────────────────────────────
      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f android/app/google-services.json
          rm -f android/app/keystore.jks
          rm -f android/key.properties
          rm -f /tmp/service-account.json
