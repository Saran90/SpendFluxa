name: Build & Distribute to Firebase

# ── Trigger ────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes shown to testers in Firebase App Distribution"
        required: false
        default: "New build from GitHub Actions"
      tester_groups:
        description: "Comma-separated Firebase tester group aliases"
        required: false
        default: "internal-testers"

concurrency:
  group: firebase-distribute
  cancel-in-progress: true

jobs:
  build-and-distribute:
    name: Build APK & Distribute
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      # ── 4. Restore google-services.json ──────────────────────────────────────
      # Secret is passed via env to avoid shell injection from special characters
      # in the base64 string (parentheses, dollar signs, etc.)
      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          python3 -c "
          import base64, os
          data = os.environ['GOOGLE_SERVICES_B64'].strip()
          decoded = base64.b64decode(data)
          with open('android/app/google-services.json', 'wb') as f:
              f.write(decoded)
          "

      # ── 5. Restore keystore ───────────────────────────────────────────────────
      - name: Restore keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          python3 -c "
          import base64, os
          data = os.environ['KEYSTORE_B64'].strip()
          decoded = base64.b64decode(data)
          with open('android/app/keystore.jks', 'wb') as f:
              f.write(decoded)
          "

      # ── 6. Create key.properties ──────────────────────────────────────────────
      - name: Create key.properties
        env:
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${STORE_PASS}
          keyPassword=${KEY_PASS}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          EOF

      # ── 7. Flutter dependencies ───────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 8. Analyse ────────────────────────────────────────────────────────────
      - name: Analyse Dart code
        run: flutter analyze --no-fatal-infos

      # ── 9. Build release APK ──────────────────────────────────────────────────
      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --android-skip-build-dependency-validation \
            --build-number=${{ github.run_number }} \
            --build-name=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)

      # ── 10. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spendfluxa-release-${{ github.run_number }}.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 11. Install Firebase CLI ──────────────────────────────────────────────
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # ── 12. Distribute via Firebase App Distribution ──────────────────────────
      - name: Distribute to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/service-account.json

          firebase appdistribution:distribute \
            build/app/outputs/flutter-apk/app-release.apk \
            --app "$FIREBASE_APP_ID" \
            --release-notes "${{ github.event.inputs.release_notes }}" \
            --groups "${{ github.event.inputs.tester_groups }}"

      # ── 13. Clean up secrets from disk ───────────────────────────────────────
      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f android/app/google-services.json
          rm -f android/app/keystore.jks
          rm -f android/key.properties
          rm -f /tmp/service-account.json
